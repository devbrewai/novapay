services:
  - type: web
    name: nova-api
    runtime: docker
    rootDir: backend
    plan: free
    region: oregon
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: CHAT_RATE_LIMIT
        value: "5"
